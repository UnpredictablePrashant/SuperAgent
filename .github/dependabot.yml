version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    open-pull-requests-limit: 5
    assignees:
      - kendr-ai
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
    open-pull-requests-limit: 3
